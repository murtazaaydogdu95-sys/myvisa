apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myvisa-postgres
  namespace: myvisa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myvisa-postgres
  namespace: myvisa
  labels:
    app: myvisa-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: myvisa-postgres
  template:
    metadata:
      labels:
        app: myvisa-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "myvisa"
            - name: POSTGRES_DB
              value: "myvisa"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myvisa-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U myvisa -d myvisa"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U myvisa -d myvisa"]
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: myvisa-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: myvisa-postgres
  namespace: myvisa
  labels:
    app: myvisa-postgres
spec:
  type: ClusterIP
  selector:
    app: myvisa-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
