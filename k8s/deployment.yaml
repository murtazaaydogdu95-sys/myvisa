apiVersion: apps/v1
kind: Deployment
metadata:
  name: myvisa-web
  namespace: myvisa
  labels:
    app: myvisa-web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: myvisa-web
  template:
    metadata:
      labels:
        app: myvisa-web
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      # Run database migrations before the web container starts. Uses the same
      # image (which bundles the Prisma CLI + schema + migrations).
      initContainers:
        - name: migrate
          image: ghcr.io/murtazaaydogdu95-sys/myvisa:latest
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: myvisa-secrets
                  key: DATABASE_URL
      containers:
        - name: web
          image: ghcr.io/murtazaaydogdu95-sys/myvisa:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          envFrom:
            - secretRef:
                name: myvisa-secrets
          resources:
            requests:
              cpu: 75m
              memory: 160Mi
            limits:
              cpu: 750m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
