# Local Postgres for MyVisa — reproduces the `myvisa-pg` container on host port 5433.
# Usage: docker compose up -d db
services:
  db:
    image: postgres:16
    container_name: myvisa-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: myvisa
      POSTGRES_PASSWORD: myvisa
      POSTGRES_DB: myvisa
    ports:
      - "5433:5432"
    volumes:
      - myvisa-pg-data:/var/lib/postgresql/data

volumes:
  myvisa-pg-data:
