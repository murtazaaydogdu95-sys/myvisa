name: Build & deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha-short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k3s
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        id: img
        run: echo "ref=ghcr.io/${{ github.repository }}:sha-${{ needs.build.outputs.sha-short }}" >> "$GITHUB_OUTPUT"

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sanity check — kubectl reachable on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            export KUBECONFIG=$HOME/.kube/config
            command -v kubectl >/dev/null || { echo "kubectl not found in PATH"; exit 1; }
            kubectl get nodes >/dev/null || { echo "kubectl cannot reach the cluster — check ~/.kube/config"; exit 1; }
            echo "kubectl OK"
          '

      - name: Sync k8s manifests to VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p ~/myvisa/k8s'
          scp -r k8s/. "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/myvisa/k8s/"

      - name: Sync runtime secrets to cluster
        env:
          DB_PASSWORD: ${{ secrets.MYVISA_DB_PASSWORD }}
          ADMIN_USER: ${{ secrets.MYVISA_ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.MYVISA_ADMIN_PASSWORD }}
          AUTH_SECRET: ${{ secrets.MYVISA_AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.MYVISA_RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.MYVISA_EMAIL_FROM }}
          ADMIN_EMAIL: ${{ secrets.MYVISA_ADMIN_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.MYVISA_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MYVISA_TELEGRAM_CHAT_ID }}
        run: |
          umask 077
          DATABASE_URL="postgresql://myvisa:${DB_PASSWORD}@myvisa-postgres:5432/myvisa?schema=public"
          cat > /tmp/myvisa-secrets.yaml <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: myvisa-secrets
            namespace: myvisa
          type: Opaque
          data:
            DATABASE_URL: $(printf '%s' "$DATABASE_URL" | base64 | tr -d '\n')
            POSTGRES_PASSWORD: $(printf '%s' "$DB_PASSWORD" | base64 | tr -d '\n')
            ADMIN_USER: $(printf '%s' "$ADMIN_USER" | base64 | tr -d '\n')
            ADMIN_PASSWORD: $(printf '%s' "$ADMIN_PASSWORD" | base64 | tr -d '\n')
            AUTH_SECRET: $(printf '%s' "$AUTH_SECRET" | base64 | tr -d '\n')
            RESEND_API_KEY: $(printf '%s' "$RESEND_API_KEY" | base64 | tr -d '\n')
            EMAIL_FROM: $(printf '%s' "$EMAIL_FROM" | base64 | tr -d '\n')
            ADMIN_EMAIL: $(printf '%s' "$ADMIN_EMAIL" | base64 | tr -d '\n')
            TELEGRAM_BOT_TOKEN: $(printf '%s' "$TELEGRAM_BOT_TOKEN" | base64 | tr -d '\n')
            TELEGRAM_CHAT_ID: $(printf '%s' "$TELEGRAM_CHAT_ID" | base64 | tr -d '\n')
          EOF

          # Ensure namespace exists, then pipe the Secret through SSH stdin into kubectl.
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'export KUBECONFIG=$HOME/.kube/config && kubectl apply -f ~/myvisa/k8s/namespace.yaml && kubectl apply -f -' \
            < /tmp/myvisa-secrets.yaml

          rm /tmp/myvisa-secrets.yaml

      - name: Ensure GHCR pull secret
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            export KUBECONFIG=\$HOME/.kube/config
            kubectl -n myvisa create secret docker-registry ghcr-login-secret \
              --docker-server=ghcr.io \
              --docker-username='${{ github.actor }}' \
              --docker-password='${{ secrets.GHCR_PULL_TOKEN }}' \
              --dry-run=client -o yaml | kubectl apply -f -
          "

      - name: Apply manifests & roll deployment
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            set -euo pipefail
            export KUBECONFIG=\$HOME/.kube/config

            kubectl apply -f ~/myvisa/k8s/namespace.yaml
            kubectl apply -f ~/myvisa/k8s/postgres.yaml
            kubectl -n myvisa rollout status deploy/myvisa-postgres --timeout=3m

            kubectl apply -f ~/myvisa/k8s/

            # Pin the freshly built image SHA on the migrate initContainer + web container.
            kubectl -n myvisa set image deploy/myvisa-web \
              migrate=${{ steps.img.outputs.ref }} \
              web=${{ steps.img.outputs.ref }}

            kubectl -n myvisa rollout status deploy/myvisa-web --timeout=4m
          "

      - name: Smoke test (https)
        run: |
          for i in $(seq 1 18); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" -L https://myvisa.aydex.nl/ || true)
            if [ "$code" = "200" ]; then
              echo "✓ myvisa.aydex.nl returned 200"
              exit 0
            fi
            echo "Attempt $i: got '$code', retrying in 10s…"
            sleep 10
          done
          echo "✗ myvisa.aydex.nl did not return 200 within 3 minutes"
          echo "Cert may still be issuing — check: kubectl describe certificate myvisa-web-tls -n myvisa"
          exit 1
